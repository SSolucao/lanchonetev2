name: Deploy para VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/lanchonetev2
            git pull origin main
            cp .env.production .env.local
            docker build -t lanchonetev2-web:latest .
            docker service update --image lanchonetev2-web:latest lanchonetev2-web
            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L https://systemfood.lanchonete.supersolucao.com.br)
            if [ "$STATUS" != "200" ]; then
              echo "HEALTHCHECK FALHOU: HTTP $STATUS"
              docker service rollback lanchonetev2-web
              exit 1
            fi
            echo "Deploy concluído com sucesso! HTTP $STATUS"
